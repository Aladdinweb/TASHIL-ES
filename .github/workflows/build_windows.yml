# COPYRIGHT ILINE TECH 2026 BY FERAK ALADDIN
name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter openpyxl pillow pyinstaller darkdetect packaging

      - name: Get patch number
        id: build_num
        run: |
          $count = (git rev-list --count HEAD)
          echo "PATCH=$count" >> $env:GITHUB_OUTPUT
          Write-Host "Patch: $count"

      - name: Inject version v1.1.PATCH
        run: |
          $p = "${{ steps.build_num.outputs.PATCH }}"
          $c = Get-Content app/utils/version.py -Raw
          $c = $c -replace 'VERSION_BUILD = \d+', "VERSION_BUILD = $p"
          Set-Content app/utils/version.py $c
          Write-Host "Version: 1.1.$p"

      - name: Generate icon
        run: python app/assets/create_icon.py
        continue-on-error: true

      - name: Verify spec
        run: |
          if (Test-Path "epsp_conge.spec") {
            Write-Host "spec OK"
          } else {
            Write-Error "spec NOT FOUND"
            exit 1
          }

      - name: Build EXE
        run: |
          pyinstaller epsp_conge.spec --clean --noconfirm --log-level WARN

      - name: Verify EXE
        run: |
          if (Test-Path "dist\EPSP_CongeManager.exe") {
            $s = (Get-Item "dist\EPSP_CongeManager.exe").Length/1MB
            Write-Host "EXE: $([math]::Round($s,1)) MB"
          } else {
            Write-Error "EXE not found"
            exit 1
          }

      - name: Decode certificate
        env:
          SIGNING_CERT_B64: ${{ secrets.SIGNING_CERT_B64 }}
        run: |
          if ("$env:SIGNING_CERT_B64" -ne "") {
            $b = [Convert]::FromBase64String($env:SIGNING_CERT_B64)
            [IO.File]::WriteAllBytes("signing_cert.pfx", $b)
            Write-Host "Certificate decoded"
          }
        continue-on-error: true

      - name: Sign EXE
        env:
          SIGNING_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if (Test-Path "signing_cert.pfx") {
            $tools = @(
              "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe",
              "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe"
            )
            $st = $tools | Where-Object {Test-Path $_} | Select-Object -First 1
            if ($st) {
              & $st sign /f "signing_cert.pfx" /p "$env:SIGNING_PASSWORD" `
                /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
                /d "EPSP ES-SENIA Gestionnaire Conges" `
                "dist\EPSP_CongeManager.exe"
              Write-Host "Signed OK"
            }
            Remove-Item "signing_cert.pfx" -Force
          }
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPSP_CongeManager_v1.1.${{ steps.build_num.outputs.PATCH }}
          path: dist/EPSP_CongeManager.exe
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.${{ steps.build_num.outputs.PATCH }}
          name: "EPSP CongeManager v1.1.${{ steps.build_num.outputs.PATCH }}"
          body: |
            ## EPSP ES-SENIA v1.1.${{ steps.build_num.outputs.PATCH }}
            **COPYRIGHT ILINE TECH 2026 BY FERAK ALADDIN**

            ### Nouveautés v1.1.x
            - Dashboard thread-safe (zéro écran noir)
            - Onglets Congé et Reliquat séparés
            - 18 services cliniques officiels EPSP
            - Mise à jour automatique in-app
            - Annuaire hiérarchique avec clic droit
            - Suppression multiple avec checkboxes
            - Maladie/Maternité sans déduction reliquat
            - Bordereau/Tableau Service en maintenance

            ### Installation Windows
            1. Télécharger `EPSP_CongeManager.exe`
            2. Placer dans `C:\EPSP\`
            3. Double-cliquer pour lancer
          draft: false
          prerelease: false
          files: dist/EPSP_CongeManager.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
