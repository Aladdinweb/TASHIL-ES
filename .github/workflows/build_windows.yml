# COPYRIGHT ILINE TECH 2026 BY FERAK ALADDIN
name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter openpyxl pillow pyinstaller darkdetect packaging

      - name: Generate icon
        run: python app/assets/create_icon.py
        continue-on-error: true

      - name: Verify spec file exists
        run: |
          if (Test-Path "epsp_conge.spec") {
            Write-Host "spec file found OK"
          } else {
            Write-Error "epsp_conge.spec NOT FOUND"
            Get-ChildItem -Name
            exit 1
          }

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller epsp_conge.spec --clean --noconfirm --log-level WARN

      - name: Verify build output
        run: |
          if (Test-Path "dist\EPSP_CongeManager.exe") {
            $size = (Get-Item "dist\EPSP_CongeManager.exe").Length / 1MB
            Write-Host "SUCCESS — EXE size: $([math]::Round($size,1)) MB"
          } else {
            Write-Error "EXE not found in dist/"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPSP_CongeManager_Windows
          path: dist/EPSP_CongeManager.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "EPSP CongeManager v1.0.${{ github.run_number }}"
          body: |
            ## EPSP ES-SENIA — Gestionnaire de Congés Annuels
            **COPYRIGHT ILINE TECH 2026 BY FERAK ALADDIN**

            ### Installation Windows
            1. Télécharger `EPSP_CongeManager.exe`
            2. Placer dans `C:\EPSP\`
            3. Double-cliquer pour lancer
            4. La base de données se crée automatiquement au premier lancement
          draft: false
          prerelease: false
          files: dist/EPSP_CongeManager.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
